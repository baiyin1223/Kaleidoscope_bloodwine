modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"
mixins=[
    {config="kaleidoscope_bloodwine.mixins.json"},
    {config="kaleidoscope_bloodwine.cgt.mixins.json"}
]

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
logoFile="logo.png"
authors="${mod_authors}"
description='''${mod_description}'''

[[dependencies."${mod_id}"]]
modId="forge"
mandatory=true
versionRange="${forge_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies."${mod_id}"]]
modId="minecraft"
mandatory=true
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies."${mod_id}"]]
modId="kaleidoscope_tavern"
mandatory=true
versionRange="[1.0.0,)"
ordering="AFTER"
side="BOTH"

[[dependencies."${mod_id}"]]
modId="vampirism"
mandatory=false
versionRange="[1.9,)"
ordering="AFTER"
side="BOTH"

[[dependencies."${mod_id}"]]
modId="creategearsandtavern"
mandatory=false
versionRange="[1.0.0,)"
ordering="AFTER"
side="BOTH"
